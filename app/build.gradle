plugins {
    id 'com.android.application'
}

android {
    namespace 'com.google.android.ims'
    compileSdk 34

    defaultConfig {
        applicationId "com.google.android.ims"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.robolectric:robolectric:4.11.1'
}
